name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Decide test scope
    runs-on: ubuntu-latest
    outputs:
      lines_changed: ${{ steps.diff.outputs.lines_changed }}
      run_full: ${{ steps.diff.outputs.run_full }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute changed lines
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"
          LINES=0
          RUN_FULL=false

          sum_range() {
            local range="$1"
            git diff --numstat "$range" | awk '
              {
                if ($1 ~ /^[0-9]+$/) add += $1;
                if ($2 ~ /^[0-9]+$/) del += $2;
              }
              END { print add + del + 0 }
            '
          }

          if [[ "$EVENT" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            LINES="$(sum_range "$BASE...$HEAD")"
            # Protect master properly: full suite on PRs to master
            RUN_FULL=true

          elif [[ "$EVENT" == "merge_group" ]]; then
            # Merge queue should behave like a protected merge path
            LINES=999999
            RUN_FULL=true

          elif [[ "$EVENT" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]]; then
              # First push / odd case: be safe
              LINES=999999
              RUN_FULL=true
            else
              LINES="$(sum_range "$BEFORE..$AFTER")"
              if (( LINES >= 100 )); then
                RUN_FULL=true
              fi
            fi
          fi

          echo "lines_changed=$LINES" >> "$GITHUB_OUTPUT"
          echo "run_full=$RUN_FULL" >> "$GITHUB_OUTPUT"

  unit-fast:
    name: Unit fast
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Bootstrap repo (dev only)
        run: |
          chmod +x setup.sh
          ./setup.sh --no-interactive-setup --extras '[dev,community,mcp,embeddings,templates]' --skip-doctor --skip-help
      - name: Run fast unit tests
        run: |
          .venv/bin/python -m pytest tests/unit/ -q

  full-suite:
    name: Full suite
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_full == 'true'

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Bootstrap repo (full CI extras)
        run: |
          chmod +x setup.sh
          ./setup.sh --no-interactive-setup --extras '[dev,mcp]' --skip-doctor --skip-help

      - name: Run full test suite
        run: |
          .venv/bin/python -m pytest tests/ -q
